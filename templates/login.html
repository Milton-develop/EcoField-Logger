<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoField | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #34a03a; border-radius: 8px; text-align: center; }
        .login-btn { width: 100%; padding: 10px; margin-top: 10px; background: #37ae68; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Welcome to <strong>EcoField Logger</strong></h2>
        <p>Please identify your role to continue</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Enter 'student' or 'admin'" required style="width: 90%; padding: 10px;">
            {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
            <button type="submit" class="login-btn">Enter Platform</button>
        </form>
    </div>
</body>
</html>
