<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/manage_groups.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/group.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <title>Admin - View Groups</title>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/admin/view_archive" class="nav-brand">EcoField Logger</a>
      <h2 class='user'>ADMIN PORTAL</h2>
      <div class="nav-links">
        <a href="/manage_groups">Manage</a>
        <a href="/admin/view_groups" class="active">View Groups</a>
        <a href="/add_species">New Species</a>
        <a href="/admin/logout" class="btn-logout">Logout</a>
      </div>
    </div>
  </nav>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <h1 class="text">Registered Groups</h1>
    <p>View all added groups and their passwords.</p>
  </div>

  <main>
    {% if groups %}
      <div class="table-container">
        <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
          <thead>
            <tr>
              <th style="padding: 1rem; border-bottom: 2px solid #ddd; text-align: left;">Group ID</th>
              <th style="padding: 1rem; border-bottom: 2px solid #ddd; text-align: left;">Password</th>
              <th style="padding: 1rem; border-bottom: 2px solid #ddd; text-align: center;">Action</th>
            </tr>
          </thead>
          <tbody>
            {% for group in groups %}
            <tr>
              <td style="padding: 1rem; border-bottom: 1px solid #ddd;">{{ group.group_id }}</td>
              <td style="padding: 1rem; border-bottom: 1px solid #ddd;">{{ group.password }}</td>
              <td style="padding: 1rem; border-bottom: 1px solid #ddd; text-align: center;">
                <form action="{{ url_for('delete_group', group_id=group.group_id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this group?');" style="margin: 0; display: inline-block;">
                  <button type="submit" class="danger-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; margin: 0; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 4px;">Delete</button>
                </form>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    {% else %}
      <p style="text-align:center; padding:2rem; font-size: 1.1rem;">No groups found.</p>
    {% endif %}
  </main>

</body>
</html>
